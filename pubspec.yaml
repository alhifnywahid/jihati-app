name: jihati
description: "Aplikasi Jihati - Panduan Lengkap Keislaman dengan Fitur Al-Quran, Doa, dan Jadwal Shalat"
publish_to: "none"

version: 1.0.0+7

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  get: ^4.7.2
  share_plus: ^11.0.0
  url_launcher: ^6.3.2
  get_storage: ^2.1.1
  intl: ^0.20.2
  flutter_svg: ^2.2.0
  flutter_lucide: ^1.6.2
  lottie: ^3.3.1
  flutter_launcher_icons: ^0.14.4
  logger: ^2.6.0
  android_intent_plus: ^5.3.0
  url_launcher_android: ^6.3.16
  forui: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  change_app_package_name: ^1.5.0

flutter:
  uses-material-design: true

  fonts:
    - family: NuikitIcon
      fonts:
        - asset: assets/fonts/NuikitIcon.ttf
    - family: SurahQuranNU
      fonts:
        - asset: assets/fonts/SurahQuranNU.ttf
    - family: LPMQ-IsepMisbah
      fonts:
        - asset: assets/fonts/LPMQ-IsepMisbah.ttf
    - family: OmarNaskh
      fonts:
        - asset: assets/fonts/OmarNaskh-Regular.ttf
          weight: 400
        - asset: assets/fonts/OmarNaskh-Medium.ttf
          weight: 500
        - asset: assets/fonts/OmarNaskh-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Light.ttf
          weight: 300
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/
    - assets/data/
    - assets/fonts/
    - assets/lottie/
    - assets/images/
    - assets/data/alquran/
    - assets/data/jihati/
    - assets/data/location/
    - assets/fonts/nu-online/
    - assets/images/icons/
    - assets/images/ilustration/
    - assets/images/svg/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
